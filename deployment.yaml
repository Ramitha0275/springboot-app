apiVersion: apps/v1  # Must be v1, not vl
kind: Deployment
metadata:
  name: springboot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
      - name: app
        image: springboot-app
        imagePullPolicy: Never
        ports:
        - containerPort: 8085
